<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actinver - Business Monitor</title>
    <style>
        /* 1. Eliminamos márgenes por defecto y fijamos el fondo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Fondo negro elegante */
            overflow: hidden; /* Evita scrolls innecesarios */
        }

        /* 2. Contenedor principal con Flexbox para centrado total */
        .main-wrapper {
            display: flex;
            flex-direction: column; /* Primera línea arriba, segunda abajo */
            justify-content: center; /* Centrado vertical */
            align-items: center;     /* Centrado horizontal */
            height: 100vh;           /* Altura total de la ventana */
            text-align: center;
        }

        /* 3. Estilo para la primera línea: Business Monitor */
        .title-text {
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 2.8rem;
            font-weight: 300;       /* Estilo ligero y moderno */
            letter-spacing: 4px;    /* Un poco de espacio entre letras para elegancia */
            margin-bottom: 30px;    /* Separación con la imagen */
            text-transform: uppercase;
        }

            .title-text-2 {
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 1.8rem;
            font-weight: 150;       /* Estilo ligero y moderno */
            letter-spacing: 4px;    /* Un poco de espacio entre letras para elegancia */
            margin-bottom: 30px;    /* Separación con la imagen */
            text-transform: uppercase;
        }

        /* 4. Estilo para la segunda línea: Imagen */
        .logo-image {
            height: 200px;          /* Altura solicitada */
            width: auto;            /* Mantiene proporción */
            max-width: 85%;         /* Responsivo: no se sale en celulares */
            object-fit: contain;
        }

        /* 5. Ajustes para celulares (Responsivo) */
        @media (max-width: 768px) {
            .title-text {
                font-size: 1.8rem;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }

                .title-text-2 {
                font-size: 0.8rem;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }



            .logo-image {
                height: 140px;      /* Reducimos un poco el logo en móviles */
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="title-text">&nbsp;</div>
        <div class="title-text-2">C O M I N G&nbsp;&nbsp;S O O N...</div>
        <div class="title-text">Business Monitor</div>
        
        <img src="logo_actinver_blanco.svg" alt="Actinver Logo" class="logo-image">
    </div>

</body>
</html>
